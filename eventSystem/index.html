<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SACLI Event System</title>
  </head>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            /* ── Core brand (vivid violet) ── */
            "primary":          "#7C3AED",
            "primary-light":    "#A78BFA",
            "primary-dark":     "#5B21B6",

            /* ── Accent palette ── */
            "secondary":        "#F43F5E",   /* coral / rose   */
            "accent":           "#06B6D4",   /* cyan           */
            "warning":          "#F59E0B",   /* amber          */
            "success":          "#10B981",   /* emerald        */

            /* ── Surfaces ── */
            "background-light": "#F5F3FF",
            "background-dark":  "#0F0A1E",
            "surface-dark":     "#1A1035",
          },
          fontFamily: {
            "display": ["Inter", "Lexend", "sans-serif"],
            "sans":    ["Inter", "Lexend", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "0.375rem",
            "lg":      "0.75rem",
            "xl":      "1rem",
            "2xl":     "1.25rem",
            "3xl":     "1.5rem",
            "full":    "9999px",
          },
          backgroundImage: {
            "grad-primary":   "linear-gradient(135deg,#7C3AED 0%,#4F46E5 100%)",
            "grad-secondary": "linear-gradient(135deg,#F43F5E 0%,#FB923C 100%)",
            "grad-accent":    "linear-gradient(135deg,#06B6D4 0%,#6366F1 100%)",
            "grad-success":   "linear-gradient(135deg,#10B981 0%,#06B6D4 100%)",
            "grad-warning":   "linear-gradient(135deg,#F59E0B 0%,#EF4444 100%)",
            "grad-hero":      "linear-gradient(135deg,#7C3AED 0%,#F43F5E 50%,#06B6D4 100%)",
          },
          boxShadow: {
            "glow-primary":   "0 0 24px rgba(124,58,237,0.40)",
            "glow-secondary": "0 0 24px rgba(244,63,94,0.40)",
            "glow-accent":    "0 0 24px rgba(6,182,212,0.40)",
            "glow-success":   "0 0 24px rgba(16,185,129,0.40)",
            "glow-warning":   "0 0 24px rgba(245,158,11,0.40)",
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', 'Lexend', sans-serif; }

    .scrollbar-hide::-webkit-scrollbar { display: none; }

    .custom-gradient {
      background: linear-gradient(180deg, rgba(15,10,30,0) 0%, rgba(15,10,30,0.92) 100%);
    }

    /* Animated shimmer gradient */
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient {
      background-size: 200% 200%;
      animation: gradient-shift 4s ease infinite;
    }

    /* Glow pulse on hover */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0px rgba(124,58,237,0); }
      50%       { box-shadow: 0 0 22px rgba(124,58,237,0.55); }
    }
    .btn-primary-glow:hover { animation: glow-pulse 1.5s ease infinite; }

    /* Stat icon float */
    @keyframes float-up {
      0%,100% { transform: translateY(0px); }
      50%     { transform: translateY(-6px); }
    }
    .stat-icon { animation: float-up 3s ease-in-out infinite; }

    /* Card hover lift */
    .card-hover {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
    }
  </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
